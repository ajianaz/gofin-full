# Local development & Keycloak testing stack.
# NOT for production — use docker-compose.selfhost.yml instead.
services:
  app:
    build:
      context: ../../api
      dockerfile: ../deployments/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - TZ=UTC
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=gofin
      - DB_USERNAME=gofin
      - DB_PASSWORD=gofin_secret
      - DB_SSL_MODE=disable
      - DB_DSN=postgres://gofin:gofin_secret@postgres:5432/gofin?sslmode=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KEYCLOAK_URL=http://keycloak:8080
      - KEYCLOAK_REALM=gofin
      - KEYCLOAK_CLIENT_ID=gofin-api
      - LOG_LEVEL=debug
      - LOG_FORMAT=json
      - AUTH_PROVIDER=disabled
      - AUTH_JWT_SECRET=change-me-in-production-32chars!
      - AUTH_ALLOW_REGISTRATION=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gofin
      POSTGRES_USER: gofin
      POSTGRES_PASSWORD: gofin_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gofin -d gofin"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    ports:
      - "8088:8080"
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: gofin
      KC_DB_PASSWORD: gofin_secret
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  redis_data:
