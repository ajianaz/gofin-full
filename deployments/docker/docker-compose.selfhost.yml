# Self-hosted deployment: Postgres + Redis + Caddy (HTTPS) + Gofin + Web UI + Backup.
# Optimized for personal/single-user use.
#
# Quick start:
#   cp .env.example .env
#   # edit .env — set AUTH_JWT_SECRET, DB_PASSWORD, DOMAIN, ADMIN_EMAIL
#   docker compose -f deployments/docker/docker-compose.selfhost.yml up -d
#
# Requirements:
#   - DOMAIN env var must be set (your public domain or IP)
#   - Caddy auto-provisions HTTPS via Let's Encrypt
#   - Backups stored in backup_data volume (mount to host for persistence)

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - caddy_data:/data
      - ./Caddyfile.selfhost:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      app:
        condition: service_healthy
      web:
        condition: service_started

  app:
    build:
      context: ../../api
      dockerfile: ../deployments/docker/Dockerfile.api
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${DOMAIN:-localhost}
      TZ: ${TZ:-UTC}
      HTTP_PORT: "8080"
      HTTP_HOST: 0.0.0.0
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gofin}
      DB_USERNAME: ${DB_USERNAME:-gofin}
      DB_PASSWORD: ${DB_PASSWORD:-gofin_secret}
      DB_SSL_MODE: prefer
      DB_DSN: postgres://${DB_USERNAME:-gofin}:${DB_PASSWORD:-gofin_secret}@postgres:5432/${DB_DATABASE:-gofin}?sslmode=prefer
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-5}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-2}
      DB_CONN_MAX_LIFETIME: 300
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_PROVIDER: local
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-change-me-in-production-32chars!}
      AUTH_JWT_EXPIRY_MINUTES: 60
      AUTH_REFRESH_EXPIRY_DAYS: 30
      AUTH_ALLOW_REGISTRATION: "${AUTH_ALLOW_REGISTRATION:-false}"
      STATIC_CRON_TOKEN: ${STATIC_CRON_TOKEN:-PLEASE_REPLACE_WITH_32_CHAR_CODE}
      LOG_LEVEL: info
      LOG_FORMAT: json
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-20}
      RATE_LIMIT_WINDOW_SECONDS: 60
      MAX_REQUEST_BODY_BYTES: 10485760
      CORS_ALLOWED_ORIGINS: https://${DOMAIN:-localhost}
      DISABLE_PROMETHEUS: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ../../web
      dockerfile: ../deployments/docker/Dockerfile.web
    environment:
      ORIGIN: https://${DOMAIN:-localhost}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  postgres:
    image: postgres:17-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-gofin}
      POSTGRES_USER: ${DB_USERNAME:-gofin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gofin_secret}
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-gofin} -d ${DB_DATABASE:-gofin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 96M
        reservations:
          memory: 32M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-gofin}
      DB_USERNAME: ${DB_USERNAME:-gofin}
      DB_PASSWORD: ${DB_PASSWORD:-gofin_secret}
      CRON_SCHEDULE: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - backup_data:/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 32M
        reservations:
          memory: 16M

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  backup_data:
