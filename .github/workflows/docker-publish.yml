name: Publish Docker Images

on:
  push:
    branches: [develop, main]
    tags: ['v*']
    paths:
      - 'api/**'
      - 'web/**'
      - 'deployments/docker/Dockerfile.*'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

# Only one publish at a time
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1: Build per-arch on native runners (parallel)
  build:
    name: Build (${{ matrix.target }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    environment: DockerHub
    strategy:
      fail-fast: false
      matrix:
        include:
          # API
          - target: api
            dockerfile: deployments/docker/Dockerfile.api
            context: api
            image: ajianaz/gofin-api
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - target: api
            dockerfile: deployments/docker/Dockerfile.api
            context: api
            image: ajianaz/gofin-api
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          # Web
          - target: web
            dockerfile: deployments/docker/Dockerfile.web
            context: web
            image: ajianaz/gofin-web
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - target: web
            dockerfile: deployments/docker/Dockerfile.web
            context: web
            image: ajianaz/gofin-web
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate tags
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            BRANCH="develop"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            BRANCH="latest"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            BRANCH="${{ github.ref_name }}"
          fi
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            ${{ matrix.image }}:${{ steps.tag.outputs.branch }}-${{ matrix.arch }}
            ${{ matrix.image }}:${{ steps.tag.outputs.sha }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.target }}-${{ matrix.arch }},mode=max

  # Stage 2: Merge into multi-arch manifest
  manifest:
    name: Merge Manifest (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: build
    environment: DockerHub
    strategy:
      matrix:
        include:
          - target: api
            image: ajianaz/gofin-api
          - target: web
            image: ajianaz/gofin-web

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate tags
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            BRANCH="develop"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            BRANCH="latest"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            BRANCH="${TAG}"
            VERSION="${TAG#v}"
            MAJOR_MINOR=$(echo "${VERSION}" | sed 's/\([0-9]*\.[0-9]*\).*/\1/')
            echo "extra_tags=${VERSION},${MAJOR_MINOR}" >> $GITHUB_OUTPUT
          fi
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create multi-arch manifest and push
        run: |
          TAGS="-t ${{ matrix.image }}:${{ steps.tag.outputs.branch }} \
                 -t ${{ matrix.image }}:${{ steps.tag.outputs.sha }}"
          if [ -n "${{ steps.tag.outputs.extra_tags }}" ]; then
            for t in $(echo "${{ steps.tag.outputs.extra_tags }}" | tr ',' ' '); do
              TAGS="$TAGS -t ${{ matrix.image }}:${t}"
            done
          fi
          docker buildx imagetools create ${TAGS} \
            ${{ matrix.image }}:${{ steps.tag.outputs.branch }}-amd64 \
            ${{ matrix.image }}:${{ steps.tag.outputs.branch }}-arm64

      - name: Verify manifest
        run: |
          echo "Manifest for ${{ matrix.image }}:${{ steps.tag.outputs.branch }}"
          docker buildx imagetools inspect ${{ matrix.image }}:${{ steps.tag.outputs.branch }}
