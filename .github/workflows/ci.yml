name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-build:
    name: API Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: api/go.sum
      - name: Build
        working-directory: api
        run: go build ./...
      - name: Vet
        working-directory: api
        run: go vet ./...

  api-unit-tests:
    name: API Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: api/go.sum
      - name: Run unit tests
        working-directory: api
        run: go test ./tests/unit/... -count=1 -v

  web-check:
    name: Web Type Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Type check
        working-directory: web
        run: bun run check
      - name: Lint
        working-directory: web
        run: bun run lint

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [api-build, web-check]
    strategy:
      matrix:
        target: [api, web]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        if: matrix.target == 'api'
        run: docker build -f deployments/docker/Dockerfile.api -t gofin-api ./api
      - name: Build Web image
        if: matrix.target == 'web'
        run: docker build -f deployments/docker/Dockerfile.web -t gofin-web ./web
