openapi: "3.0.3"
info:
  title: Gofin API
  description: >
    Go rewrite of Firefly III personal finance manager.
    All protected endpoints require a JWT bearer token in the Authorization header.
    All ID fields use UUID v7 format.
  version: "1.0.0"
  contact:
    name: Gofin
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: System
    description: Health and metrics
  - name: Auth
    description: Authentication and token management
  - name: Users
    description: Current user profile
  - name: Groups
    description: User groups for multi-tenant access
  - name: Wallets
    description: Financial accounts (wallets)
  - name: Wallet Members
    description: Wallet member management and sharing
  - name: Transactions
    description: Double-entry transactions
  - name: Categories
    description: Transaction categories
  - name: Tags
    description: Transaction tags
  - name: Budgets
    description: Budget management
  - name: Piggy Banks
    description: Savings goals per wallet
  - name: Rule Groups
    description: Rule group management
  - name: Rules
    description: Automation rules
  - name: Recurrences
    description: Recurring transactions
  - name: Currencies
    description: Currency reference data
  - name: Wallet Types
    description: Wallet type reference data
  - name: Bills
    description: Recurring bills
  - name: Exchange Rates
    description: Currency exchange rates
  - name: Webhooks
    description: Webhook integrations
  - name: Attachments
    description: File attachments (polymorphic)
  - name: Notifications
    description: User notifications and SSE stream
  - name: Preferences
    description: User preferences
  - name: Configurations
    description: System-level configuration
  - name: Object Groups
    description: Grouping/ordering for objects
  - name: Notes
    description: Polymorphic notes
  - name: Locations
    description: Polymorphic locations
  - name: Export
    description: Data export
  - name: Analytics
    description: Financial analytics and reporting
  - name: Audit
    description: Audit trail
  - name: API Keys
    description: API key management
  - name: Admin
    description: Admin-only system management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Group ID
    WalletId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Wallet ID
    WalletIdParam:
      name: wallet_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Wallet ID (for nested routes)
    TransactionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Transaction ID
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Category ID
    TagId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Tag ID
    BudgetId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Budget ID
    PiggyBankId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Piggy bank ID
    RuleGroupId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Rule group ID
    RuleId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Rule ID
    RecurrenceId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Recurrence ID
    BillId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Bill ID
    ExchangeRateId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Exchange rate ID
    WebhookId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Webhook ID
    AttachmentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Attachment ID
    NotificationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Notification ID
    NoteId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Note ID
    LocationId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Location ID
    ObjectGroupId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Object group ID
    ApiKeyId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: API key ID
    WalletMemberId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Wallet member ID
    WalletMemberUserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: User ID (for removing wallet member)
    CurrencyCode:
      name: code
      in: path
      required: true
      schema:
        type: string
      description: Currency code (e.g. USD, EUR)
    PreferenceName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Preference name
    ConfigurationName:
      name: name
      in: path
      required: true
      schema:
        type: string
      description: Configuration name
    OAuthProvider:
      name: provider
      in: path
      required: true
      schema:
        type: string
      description: OAuth provider name

  schemas:
    Error:
      type: object
      properties:
        status:
          type: integer
          example: 400
        title:
          type: string
          example: Bad Request
        detail:
          type: string
          example: Invalid request body

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: secret123

    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: secret123
        name:
          type: string
          example: John Doe

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
        token_type:
          type: string
          example: Bearer

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    GroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string

    WalletRequest:
      type: object
      required:
        - name
        - type
        - currency_code
      properties:
        name:
          type: string
        type:
          type: string
          description: Wallet type code
        currency_code:
          type: string
          example: USD
        balance:
          type: number
          format: double
        virtual_balance:
          type: number
          format: double
        active:
          type: boolean
          default: true

    TransactionRequest:
      type: object
      required:
        - type
        - date
        - amount
        - source_id
      properties:
        type:
          type: string
          enum: [withdrawal, deposit, transfer]
        date:
          type: string
          format: date-time
        amount:
          type: string
        source_id:
          type: string
          format: uuid
        destination_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        notes:
          type: string

    SplitTransactionRequest:
      type: object
      required:
        - transactions
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRequest"

    CategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        parent_id:
          type: string
          format: uuid

    TagRequest:
      type: object
      required:
        - tag
      properties:
        tag:
          type: string
        date:
          type: string
          format: date-time
        description:
          type: string

    BudgetRequest:
      type: object
      required:
        - name
        - start_date
        - amount
        - currency_code
      properties:
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        amount:
          type: string
        currency_code:
          type: string
          example: USD

    PiggyBankRequest:
      type: object
      required:
        - name
        - target_amount
      properties:
        name:
          type: string
        target_amount:
          type: string
        start_date:
          type: string
          format: date
        target_date:
          type: string
          format: date

    PiggyBankMoneyRequest:
      type: object
      required:
        - amount
      properties:
        amount:
          type: string
          description: Amount to add or remove

    RuleGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string
        active:
          type: boolean
          default: true

    RuleRequest:
      type: object
      required:
        - title
        - rule_group_id
        - triggers
        - actions
      properties:
        title:
          type: string
        rule_group_id:
          type: string
          format: uuid
        description:
          type: string
        active:
          type: boolean
          default: true
        triggers:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: string
        actions:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
              value:
                type: string

    RecurrenceRequest:
      type: object
      required:
        - title
        - type
        - repetition_type
        - repetition_end
      properties:
        title:
          type: string
        type:
          type: string
          enum: [withdrawal, deposit, transfer]
        description:
          type: string
        repetition_type:
          type: string
          enum: [daily, weekly, monthly, yearly]
        repetition_end:
          type: string
          format: date
        apply_rules:
          type: boolean
          default: true
        active:
          type: boolean
          default: true

    BillRequest:
      type: object
      required:
        - name
        - amount_min
        - currency_code
        - date
      properties:
        name:
          type: string
        amount_min:
          type: string
        amount_max:
          type: string
        currency_code:
          type: string
          example: USD
        date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        repeat_freq:
          type: string
        skip:
          type: integer
        notes:
          type: string

    ExchangeRateRequest:
      type: object
      required:
        - from_currency
        - to_currency
        - rate
        - date
      properties:
        from_currency:
          type: string
          example: USD
        to_currency:
          type: string
          example: EUR
        rate:
          type: number
          format: double
        date:
          type: string
          format: date

    WebhookRequest:
      type: object
      required:
        - url
        - trigger
      properties:
        url:
          type: string
          format: uri
        trigger:
          type: string
          enum: [STORE_TRANSACTION, UPDATE_TRANSACTION, DESTROY_TRANSACTION]
        active:
          type: boolean
          default: true

    AttachmentRequest:
      type: object
      required:
        - filename
        - mime_type
      properties:
        filename:
          type: string
        mime_type:
          type: string
        content:
          type: string
          format: byte
          description: Base64-encoded file content

    PreferenceRequest:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
        value:
          type: string

    ConfigurationRequest:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
        value:
          type: string

    ObjectGroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        order:
          type: integer

    NoteRequest:
      type: object
      required:
        - text
      properties:
        text:
          type: string
        noteable_id:
          type: string
          format: uuid
        noteable_type:
          type: string

    LocationRequest:
      type: object
      properties:
        latitude:
          type: number
          format: double
        longitude:
          type: number
          format: double
        zoom_level:
          type: integer
        locatable_id:
          type: string
          format: uuid
        locatable_type:
          type: string

    WalletMemberRequest:
      type: object
      required:
        - user_id
        - role
      properties:
        user_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [owner, manage_meta, manage_transactions, manage_budgets, manage_piggy_banks, manage_rules, manage_recurring, manage_currencies, manage_webhooks, view_memberships, view_reports]

    FeatureFlagRequest:
      type: object
      required:
        - name
        - enabled
      properties:
        name:
          type: string
        enabled:
          type: boolean

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      description: Returns service health status including database and Redis connectivity.
      operationId: healthCheck
      tags: [System]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /metrics:
    get:
      summary: Prometheus metrics
      description: Expose Prometheus-format metrics.
      operationId: metrics
      tags: [System]
      security: []
      responses:
        "200":
          description: Prometheus metrics in text format

  /api/v1:
    get:
      summary: API info
      description: Returns basic API version information.
      operationId: apiInfo
      tags: [System]
      security: []
      responses:
        "200":
          description: API info
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Gofin API v1
                  version:
                    type: string
                    example: 1.0.0

  /api/v1/docs:
    get:
      summary: API documentation
      description: HTML documentation page for the API.
      operationId: apiDocs
      tags: [System]
      responses:
        "200":
          description: HTML documentation page

  /api/v1/openapi.json:
    get:
      summary: OpenAPI specification
      description: Returns the OpenAPI 3.0.3 spec in YAML or JSON format.
      operationId: openapiSpec
      tags: [System]
      responses:
        "200":
          description: OpenAPI specification

  # -- Auth -----------------------------------------------------------------
  /api/v1/auth/provider:
    get:
      summary: Get auth provider
      description: Returns the configured authentication provider.
      operationId: getAuthProvider
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Auth provider info
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/register:
    post:
      summary: Register
      description: Create a new user account.
      operationId: register
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/login:
    post:
      summary: Login
      description: Authenticate user with email and password, returns JWT tokens.
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/logout:
    post:
      summary: Logout
      description: Invalidate the current session/token.
      operationId: logout
      tags: [Auth]
      responses:
        "200":
          description: Successfully logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      description: Exchange a refresh token for a new access token.
      operationId: refreshToken
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/{provider}/url:
    get:
      summary: OAuth authorization URL
      description: Get the OAuth authorization URL for the specified provider.
      operationId: oauthURL
      tags: [Auth]
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
      responses:
        "200":
          description: OAuth authorization URL
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/auth/{provider}/callback:
    get:
      summary: OAuth callback
      description: Handle OAuth callback from the specified provider.
      operationId: oauthCallback
      tags: [Auth]
      security: []
      parameters:
        - $ref: "#/components/parameters/OAuthProvider"
      responses:
        "200":
          description: OAuth authentication result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "500":
          $ref: "#/components/responses/InternalError"

  # -- Users ----------------------------------------------------------------
  /api/v1/users/me:
    get:
      summary: Get current user
      description: Returns the authenticated user's profile.
      operationId: getCurrentUser
      tags: [Users]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Update current user
      description: Update the authenticated user's profile.
      operationId: updateCurrentUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Updated user profile
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # -- Groups ---------------------------------------------------------------
  /api/v1/groups:
    get:
      summary: List groups
      description: List all user groups the authenticated user belongs to.
      operationId: listGroups
      tags: [Groups]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of groups
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create group
      description: Create a new user group.
      operationId: createGroup
      tags: [Groups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
      responses:
        "201":
          description: Group created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/groups/switch:
    post:
      summary: Switch active group
      description: Switch the user's active group context for subsequent requests.
      operationId: switchGroup
      tags: [Groups]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - group_id
              properties:
                group_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Active group switched
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/groups/{id}:
    get:
      summary: Get group
      description: Get a specific group by ID.
      operationId: getGroup
      tags: [Groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update group
      description: Update a group's details.
      operationId: updateGroup
      tags: [Groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
      responses:
        "200":
          description: Group updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete group
      description: Delete a group. Requires owner role.
      operationId: deleteGroup
      tags: [Groups]
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # -- Wallets --------------------------------------------------------------
  /api/v1/wallets:
    get:
      summary: List wallets
      description: List all financial accounts (wallets) for the active group.
      operationId: listWallets
      tags: [Wallets]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: type
          in: query
          description: Filter by wallet type
          schema:
            type: string
      responses:
