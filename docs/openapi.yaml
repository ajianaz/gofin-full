openapi: "3.0.3"
info:
  title: Gofin API
  description: >
    Go rewrite of Firefly III personal finance manager.
    All protected endpoints require a JWT bearer token in the Authorization header.
  version: "1.0.0"
  contact:
    name: Gofin
  license:
    name: MIT

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: System
    description: Health and metrics
  - name: Auth
    description: Authentication and token management
  - name: Users
    description: Current user profile
  - name: Groups
    description: User groups for multi-tenant access
  - name: Accounts
    description: Financial accounts (wallets)
  - name: Transactions
    description: Double-entry transactions
  - name: Categories
    description: Transaction categories
  - name: Tags
    description: Transaction tags
  - name: Budgets
    description: Budget management
  - name: Piggy Banks
    description: Savings goals per account
  - name: Rules
    description: Rule groups and automation rules
  - name: Recurrences
    description: Recurring transactions
  - name: Currencies
    description: Currency reference data
  - name: Account Types
    description: Account type reference data
  - name: Bills
    description: Recurring bills
  - name: Exchange Rates
    description: Currency exchange rates
  - name: Webhooks
    description: Webhook integrations
  - name: Attachments
    description: File attachments (polymorphic)
  - name: Notifications
    description: User notifications and SSE stream
  - name: Preferences
    description: User preferences
  - name: Configurations
    description: System-level configuration
  - name: Object Groups
    description: Grouping/ordering for objects
  - name: Notes
    description: Polymorphic notes
  - name: Locations
    description: Polymorphic locations
  - name: Members
    description: Wallet member management and sharing
  - name: Export
    description: Data export
  - name: Analytics
    description: Financial analytics and reporting
  - name: Audit
    description: Audit trail
  - name: Admin
    description: Admin-only system management

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    GroupId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Group ID
    AccountId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Account ID
    TransactionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Transaction ID
    CategoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Category ID
    TagId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Tag ID
    BudgetId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Budget ID
    WebhookId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Webhook ID

  schemas:
    Error:
      type: object
      properties:
        status:
          type: integer
          example: 400
        title:
          type: string
          example: Bad Request
        detail:
          type: string
          example: Invalid request body

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: secret123

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
          example: 3600
        token_type:
          type: string
          example: Bearer

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time

    GroupRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        description:
          type: string

    AccountRequest:
      type: object
      required:
        - name
        - type
        - currency_code
      properties:
        name:
          type: string
        type:
          type: string
          description: Account type code
        currency_code:
          type: string
          example: USD
        balance:
          type: number
          format: double
        virtual_balance:
          type: number
          format: double
        active:
          type: boolean
          default: true

    TransactionRequest:
      type: object
      required:
        - type
        - date
        - amount
        - source_id
      properties:
        type:
          type: string
          enum: [withdrawal, deposit, transfer]
        date:
          type: string
          format: date-time
        amount:
          type: string
        source_id:
          type: string
          format: uuid
        destination_id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        notes:
          type: string

    SplitTransactionRequest:
      type: object
      required:
        - transactions
      properties:
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/TransactionRequest"

    CategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        parent_id:
          type: string
          format: uuid

    TagRequest:
      type: object
      required:
        - tag
      properties:
        tag:
          type: string
        date:
          type: string
          format: date-time
        description:
          type: string

    BudgetRequest:
      type: object
      required:
        - name
        - start_date
        - amount
        - currency_code
      properties:
        name:
          type: string
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        amount:
          type: string
        currency_code:
          type: string
          example: USD

    WebhookRequest:
      type: object
      required:
        - url
        - trigger
      properties:
        url:
          type: string
          format: uri
        trigger:
          type: string
          enum: [STORE_TRANSACTION, UPDATE_TRANSACTION, DESTROY_TRANSACTION]
        active:
          type: boolean
          default: true

  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Insufficient permissions for this action
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

paths:
  /health:
    get:
      summary: Health check
      description: Returns service health status including database and Redis connectivity.
      operationId: healthCheck
      tags: [System]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /metrics:
    get:
      summary: Prometheus metrics
      description: Expose Prometheus-format metrics.
      operationId: metrics
      tags: [System]
      responses:
        "200":
          description: Prometheus metrics in text format

  /api/v1:
    get:
      summary: API info
      description: Returns basic API version information.
      operationId: apiInfo
      tags: [System]
      responses:
        "200":
          description: API info
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Gofin API v1
                  version:
                    type: string
                    example: 1.0.0

  /api/v1/docs:
    get:
      summary: API documentation
      description: HTML documentation page for the API.
      operationId: apiDocs
      tags: [System]
      responses:
        "200":
          description: HTML documentation page

  /api/v1/openapi.json:
    get:
      summary: OpenAPI specification
      description: Returns the OpenAPI 3.0.3 spec in YAML or JSON format.
      operationId: openapiSpec
      tags: [System]
      responses:
        "200":
          description: OpenAPI specification

  # ── Auth ────────────────────────────────────────────────────────────
  /api/v1/auth/provider:
    get:
      summary: Get auth provider
      description: Returns the configured authentication provider.
      operationId: getAuthProvider
      tags: [Auth]
      responses:
        "200":
          description: Auth provider info
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/login:
    post:
      summary: Login
      description: Authenticate user with email and password, returns JWT tokens.
      operationId: login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Successful authentication
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/auth/logout:
    post:
      summary: Logout
      description: Invalidate the current session/token.
      operationId: logout
      tags: [Auth]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Successfully logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/refresh:
    post:
      summary: Refresh token
      description: Exchange a refresh token for a new access token.
      operationId: refreshToken
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: New token pair
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Users ───────────────────────────────────────────────────────────
  /api/v1/users/me:
    get:
      summary: Get current user
      description: Returns the authenticated user's profile.
      operationId: getCurrentUser
      tags: [Users]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      summary: Update current user
      description: Update the authenticated user's profile.
      operationId: updateCurrentUser
      tags: [Users]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Updated user profile
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Groups ──────────────────────────────────────────────────────────
  /api/v1/groups:
    get:
      summary: List groups
      description: List all user groups the authenticated user belongs to.
      operationId: listGroups
      tags: [Groups]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of groups
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create group
      description: Create a new user group.
      operationId: createGroup
      tags: [Groups]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
      responses:
        "201":
          description: Group created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/groups/switch:
    post:
      summary: Switch active group
      description: Switch the user's active group context for subsequent requests.
      operationId: switchGroup
      tags: [Groups]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - group_id
              properties:
                group_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Active group switched
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/groups/{id}:
    get:
      summary: Get group
      description: Get a specific group by ID.
      operationId: getGroup
      tags: [Groups]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update group
      description: Update a group's details.
      operationId: updateGroup
      tags: [Groups]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRequest"
      responses:
        "200":
          description: Group updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete group
      description: Delete a group. Requires owner role.
      operationId: deleteGroup
      tags: [Groups]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/GroupId"
      responses:
        "200":
          description: Group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Accounts (Wallets) ──────────────────────────────────────────────
  /api/v1/accounts:
    get:
      summary: List accounts
      description: List all financial accounts (wallets) for the active group.
      operationId: listAccounts
      tags: [Accounts]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: type
          in: query
          description: Filter by account type
          schema:
            type: string
      responses:
        "200":
          description: List of accounts
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create account
      description: Create a new financial account. Requires manage_meta role.
      operationId: createAccount
      tags: [Accounts]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountRequest"
      responses:
        "201":
          description: Account created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/accounts/{id}:
    get:
      summary: Get account
      description: Get account details by ID.
      operationId: getAccount
      tags: [Accounts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Account details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update account
      description: Update an account's details. Requires manage_meta role.
      operationId: updateAccount
      tags: [Accounts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AccountId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountRequest"
      responses:
        "200":
          description: Account updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete account
      description: Delete an account. Requires manage_meta role.
      operationId: deleteAccount
      tags: [Accounts]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AccountId"
      responses:
        "200":
          description: Account deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Transactions ────────────────────────────────────────────────────
  /api/v1/transactions:
    get:
      summary: List transactions
      description: List transactions with optional filtering and pagination.
      operationId: listTransactions
      tags: [Transactions]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: type
          in: query
          description: Filter by transaction type
          schema:
            type: string
            enum: [withdrawal, deposit, transfer]
        - name: start_date
          in: query
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          schema:
            type: string
            format: date
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of transactions
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create transaction
      description: Create a new double-entry transaction. Requires manage_transactions role.
      operationId: createTransaction
      tags: [Transactions]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequest"
      responses:
        "201":
          description: Transaction created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/transactions/split:
    post:
      summary: Create split transaction
      description: Create a split transaction with multiple journals. Requires manage_transactions role.
      operationId: createSplitTransaction
      tags: [Transactions]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SplitTransactionRequest"
      responses:
        "201":
          description: Split transaction created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/transactions/{id}:
    get:
      summary: Get transaction
      description: Get transaction details by ID.
      operationId: getTransaction
      tags: [Transactions]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      responses:
        "200":
          description: Transaction details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update transaction
      description: Update a transaction. Requires manage_transactions role.
      operationId: updateTransaction
      tags: [Transactions]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequest"
      responses:
        "200":
          description: Transaction updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete transaction
      description: Delete a transaction. Requires manage_transactions role.
      operationId: deleteTransaction
      tags: [Transactions]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TransactionId"
      responses:
        "200":
          description: Transaction deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Categories ──────────────────────────────────────────────────────
  /api/v1/categories:
    get:
      summary: List categories
      description: List all categories for the active group.
      operationId: listCategories
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: List of categories
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      summary: Create category
      description: Create a new category. Requires manage_meta role.
      operationId: createCategory
      tags: [Categories]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "201":
          description: Category created
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/categories/{id}:
    get:
      summary: Get category
      operationId: getCategory
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "200":
          description: Category details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      summary: Update category
      operationId: updateCategory
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "200":
          description: Category updated
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      summary: Delete category
      operationId: deleteCategory
      tags: [Categories]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/CategoryId"
      responses:
        "200":
          description: Category deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

