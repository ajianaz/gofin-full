  /api/v1/analytics/spending-by-category:
    get:
      summary: Spending by category
      description: Get spending totals grouped by category for a date range. Requires view_reports role.
      operationId: spendingByCategory
      tags: [Analytics]
      security:
        - BearerAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: group_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Spending breakdown by category
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/analytics/spending-by-period:
    get:
      summary: Spending by period
      description: Get spending totals grouped by time period. Requires view_reports role.
      operationId: spendingByPeriod
      tags: [Analytics]
      security:
        - BearerAuth: []
      parameters:
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year]
            default: month
      responses:
        "200":
          description: Spending breakdown by period
